name: Refresh menu data

on:
  schedule:
    # Every day at 14:00 UTC (≈ 6 AM Pacific, after the dining team has had a
    # chance to update the sheets for the day).
    - cron: "0 14 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    # Don't re-trigger on the bot's own data commits or on TO-DO scratch
    # files; only run when the actual code/config changes.
    paths-ignore:
      - "data/**"
      - "TO-DO-*.md"
      - "README.md"
      - "image.png"

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/refresh.mjs
      - name: Install firebase-admin for summary script
        # Always install — the script early-exits when the secrets are
        # missing, so it's cheaper to install unconditionally than to gate
        # on env vars that GitHub Actions evaluates before the step env
        # block is wired up (the previous `if:` here never matched).
        run: npm install firebase-admin --no-save --silent
      - name: Generate weekly feedback summary
        run: node scripts/summary.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sheets.json data/images.json data/summary.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh menu data ($(date -u +'%Y-%m-%d'))"
            git push
          fi
