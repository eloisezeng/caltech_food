name: Refresh menu data

on:
  schedule:
    # Every day at 14:00 UTC (≈ 6 AM Pacific, after the dining team has had a
    # chance to update the sheets for the day).
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/refresh.mjs
      - name: Install firebase-admin for summary script
        run: npm install firebase-admin --no-save --silent
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' && env.GEMINI_API_KEY != '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Generate weekly feedback summary
        run: node scripts/summary.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sheets.json data/images.json data/summary.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh menu data ($(date -u +'%Y-%m-%d'))"
            git push
          fi
