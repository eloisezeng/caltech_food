name: Refresh menu data

on:
  schedule:
    # Every day at 14:00 UTC (≈ 6 AM Pacific, after the dining team has had a
    # chance to update the sheets for the day).
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/refresh.mjs
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sheets.json data/images.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh menu data ($(date -u +'%Y-%m-%d'))"
            git push
          fi
