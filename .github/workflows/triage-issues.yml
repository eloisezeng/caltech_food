name: AI triage for feature-request issues

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: triage-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    # Only run when the feature-request label is on the issue. Cheaper than
    # filtering inside the script and avoids spurious Gemini calls.
    if: contains(join(github.event.issue.labels.*.name, ','), 'feature-request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run AI triage
        run: node scripts/triage-issue.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER:  ${{ github.event.issue.number }}
          ISSUE_TITLE:   ${{ github.event.issue.title }}
          ISSUE_BODY:    ${{ github.event.issue.body }}
          ISSUE_LABELS:  ${{ join(github.event.issue.labels.*.name, ',') }}
