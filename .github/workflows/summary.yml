name: Refresh weekly summary

# The summary regenerates whenever code is pushed (so a deployment of new
# features also publishes a fresh write-up of how students reacted) and on
# a 6-hour cron as a safety net. paths-ignore prevents the bot's own
# `data/summary.json` commit from infinitely re-triggering the job.

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-summary
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install firebase-admin
        run: npm install firebase-admin --no-save --silent
      - name: Generate weekly summary
        run: node scripts/summary.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
      - name: Commit
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage everything we wrote outside the working tree so we can
          # safely reset-hard between push attempts. The script may write
          # data/summary.json AND (when a Sun-Sat boundary rolls over) one
          # or more files under data/summaries/.
          mkdir -p /tmp/staged
          cp -r data/summary.json data/summaries /tmp/staged/ 2>/dev/null || true
          for i in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/staged/summary.json data/summary.json 2>/dev/null || true
            mkdir -p data/summaries
            cp -r /tmp/staged/summaries/. data/summaries/ 2>/dev/null || true
            git add data/summary.json data/summaries 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "Summary unchanged vs main."
              exit 0
            fi
            git commit -m "Refresh weekly summary"
            git push && exit 0
            echo "Push attempt $i lost the race; retrying…"
            sleep 3
          done
          echo "Push failed after 3 retries." && exit 1
