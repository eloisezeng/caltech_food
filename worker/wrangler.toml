name = "caltech-food-feature-request"
main = "feature-request.js"
compatibility_date = "2024-09-01"

# Non-secret config. Change ALLOWED_ORIGINS if you serve the site from a
# different domain (e.g. a custom domain on GitHub Pages).
[vars]
GITHUB_REPO     = "eloisezeng/caltech_food"
ALLOWED_ORIGINS = "https://eloisezeng.github.io,http://localhost:8000,http://localhost:8765"

# Secrets are NOT in this file. Set them once after `wrangler deploy`:
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put GEMINI_API_KEY
